<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Engine</title>
    <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>

<div class="app-container">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <h2>Math Engine</h2>

        <nav>
            <button>Arithmetic</button>
            <button>Trigonometry</button>
            <button>Expressions</button>
            <button>Statistics</button>
            <button>Geometry 2D</button>
            <button>Geometry 3D</button>
            <button>Linear Algebra</button>
            <button>Plotting</button>
            <button>History</button>
            <button>Settings</button>
        </nav>
    </aside>

    <!-- TOP RIGHT: OUTPUT / GRAPH AREA -->
    <section class="output-panel">
        <h2>Output</h2>

        <div id="result-display">
            Results will appear here...
        </div>

        <div id="plot-display">
            Graphs will appear here...
        </div>
    </section>

    <!-- BOTTOM RIGHT: INPUT AREA -->
    <section class="input-panel">
        <h2>Input</h2>

        <div id="input-area">

            <label for="test-input">Test Input:</label>
            <input id="test-input" type="text" placeholder="Type something...">

        </div>

        <button id="run-btn">Run</button>
    </section>

</div>

<script src="../static/js/app.js"></script>
</body>
</html>
