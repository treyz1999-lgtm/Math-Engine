<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Engine</title>

    <link rel="stylesheet" href="../static/css/styles.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>

<div class="app-container">

    <aside class="sidebar">
        <h2>Math Engine</h2>

        <nav>
            <button id="arithmetic-btn">Arithmetic</button>
            <button id="trig-btn">Trigonometry</button>
            <button id="expressions-btn">Expressions</button>
            <button id="stats-btn">Statistics</button>
            <button id="geometry2d-btn">Geometry 2D</button>
            <button id="geometry3d-btn">Geometry 3D</button>
            <button id="linear-btn">Linear Algebra</button>
            <button id="plot-btn">Plotting</button>
            <button id="history-btn">History</button>
            <button id="settings-btn">Settings</button>
        </nav>
    </aside>

    <section class="output-panel">
        <h2>Output</h2>

        <div id="result-display">
            Results will appear here...
        </div>

        <div id="plot-display">
            Graphs will appear here...
        </div>
    </section>

    <section class="input-panel">
        <h2>Input</h2>

        <div id="input-area"></div>

        <button id="run-btn">Run</button>
    </section>

</div>

<script src="../static/js/config.js"></script>
<script src="../static/js/api.js"></script>
<script src="../static/js/app.js"></script>

</body>
</html>
